services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aicare
      POSTGRES_USER: aicare
      POSTGRES_PASSWORD: aicare_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aicare']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://aicare:aicare_secret@db:5432/aicare
      PORT: 3001
      OPENAI_API_KEY: '${OPENAI_API_KEY}'
      OPENAI_MODEL: 'gpt-4o-mini'
    ports:
      - '3001:3001'
    volumes:
      - wa_session:/app/wa-session
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:3001
    ports:
      - '3005:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
  wa_session:
  uploads:
